name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jotek_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jotek_test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: test-secret-for-ci-only
      BETTER_AUTH_URL: http://localhost:4000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm db:push
        working-directory: apps/api

      - run: pnpm test --filter=api

  deploy-api:
    name: Deploy API → Railway
    needs: [lint-typecheck, test-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: railwayapp/railway-action@v2
        with:
          service: jotek-api
          token: ${{ secrets.RAILWAY_TOKEN }}

  deploy-storefront:
    name: Deploy Storefront → Railway
    needs: [lint-typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: railwayapp/railway-action@v2
        with:
          service: jotek-storefront
          token: ${{ secrets.RAILWAY_TOKEN }}

  deploy-admin:
    name: Deploy Admin → Railway
    needs: [lint-typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: railwayapp/railway-action@v2
        with:
          service: jotek-admin
          token: ${{ secrets.RAILWAY_TOKEN }}
